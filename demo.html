<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo — DocuStream</title>
  <link rel="stylesheet" href="style.css">

  <!-- D3.js para grafo real -->
  <script src="https://d3js.org/d3.v7.min.js"></script>

  <style>
    body {
      padding: 40px;
      transition: background 0.3s, color 0.3s;
    }

    .dark {
      background: #0E0E0E;
      color: #f8f7f4;
    }

    h1, h2 {
      text-align: center;
    }

    .demo-section {
      margin-bottom: 60px;
    }

    /* DASHBOARD */
    .dashboard {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 40px;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid #D3D1C7;
      width: 200px;
      text-align: center;
      transition: background 0.3s, color 0.3s;
    }

    .dark .card {
      background: #1A1A1A;
      border-color: #333;
    }

    .metric-value {
      font-size: 32px;
      font-weight: bold;
      color: #534AB7;
    }

    /* HEATMAP */
    .heatmap {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .bar {
      width: 40px;
      border-radius: 8px;
      transition: height 0.3s;
    }

    /* MODO OSCURO */
    .toggle-dark {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 10px 20px;
      background: #534AB7;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="toggle-dark" id="toggleDark">Modo oscuro</div>

<h1>Demo interactiva — DocuStream</h1>

<!-- DASHBOARD -->
<div class="demo-section">
  <h2>Mini dashboard</h2>

  <div class="dashboard">
    <div class="card">
      <div class="metric-value" id="metric1">85%</div>
      Obsolescencia
    </div>
    <div class="card">
      <div class="metric-value" id="metric2">50ms</div>
      Tiempo de consulta
    </div>
    <div class="card">
      <div class="metric-value" id="metric3">42%</div>
      Secciones ignoradas
    </div>
  </div>
</div>

<!-- GRAFO REAL -->
<div class="demo-section">
  <h2>Grafo semántico real</h2>
  <svg id="graph" width="800" height="500" style="display:block;margin:auto;"></svg>
</div>

<!-- HEATMAP REAL -->
<div class="demo-section">
  <h2>Heatmap real</h2>
  <div class="heatmap" id="heatmap"></div>
</div>

<script>
/* ===========================
   MODO OSCURO
=========================== */
document.getElementById("toggleDark").onclick = () => {
  document.body.classList.toggle("dark");
};

/* ===========================
   MÉTRICAS DINÁMICAS
=========================== */
function randomMetric(id, min, max, suffix="") {
  setInterval(() => {
    const value = Math.floor(Math.random() * (max - min + 1)) + min;
    document.getElementById(id).textContent = value + suffix;
  }, 2000);
}

randomMetric("metric1", 70, 95, "%");
randomMetric("metric2", 30, 80, "ms");
randomMetric("metric3", 20, 60, "%");

/* ===========================
   HEATMAP REAL
=========================== */
const heatmap = document.getElementById("heatmap");

for (let i = 0; i < 12; i++) {
  const bar = document.createElement("div");
  bar.className = "bar";
  bar.style.height = (Math.random() * 200 + 100) + "px";
  bar.style.background = "linear-gradient(to top, #E03A2F, #F28C2B, #F7D154)";
  heatmap.appendChild(bar);
}

/* ===========================
   GRAFO REAL CON D3.js
=========================== */
const svg = d3.select("#graph");
const width = +svg.attr("width");
const height = +svg.attr("height");

const nodes = d3.range(12).map(() => ({radius: 10}));
const links = d3.range(12).map(() => ({
  source: Math.floor(Math.random()*12),
  target: Math.floor(Math.random()*12)
}));

const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).distance(120))
  .force("charge", d3.forceManyBody().strength(-200))
  .force("center", d3.forceCenter(width / 2, height / 2));

const link = svg.append("g")
  .attr("stroke", "#aaa")
  .selectAll("line")
  .data(links)
  .enter().append("line");

const node = svg.append("g")
  .selectAll("circle")
  .data(nodes)
  .enter().append("circle")
  .attr("r", 10)
  .attr("fill", () => ["#0F6E56", "#534AB7", "#7A4DF3", "#F7D154"][Math.floor(Math.random()*4)])
  .call(drag(simulation));

function drag(simulation) {
  function dragstarted(event) {
    if (!event.active) simulation.alphaTarget(0.3).restart();
    event.subject.fx = event.subject.x;
    event.subject.fy = event.subject.y;
  }
  function dragged(event) {
    event.subject.fx = event.x;
    event.subject.fy = event.y;
  }
  function dragended(event) {
    if (!event.active) simulation.alphaTarget(0);
    event.subject.fx = null;
    event.subject.fy = null;
  }
  return d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended);
}

simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x)
    .attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x)
    .attr("y2", d => d.target.y);

  node
    .attr("cx", d => d.x)
    .attr("cy", d => d.y);
});
</script>

</body>
</html>
