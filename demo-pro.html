<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuStream PRO Demo</title>

    <!-- ESTILOS -->
    <link rel="stylesheet" href="style-pro.css">

    <!-- LIBRERÍAS -->
    <script src="gsap.min.js"></script>
    <script src="d3.v7.min.js"></script>
</head>

<body>

    <aside class="sidebar">
        <h2>DocuStream PRO</h2>

        <nav>
            <button onclick="showView('dashboard')">Dashboard</button>
            <button onclick="showView('documents')">Documentos</button>
            <button onclick="showView('integrations')">Integraciones</button>
            <button onclick="showView('graph-advanced')">Grafo Avanzado</button>
        </nav>
    </aside>

    <main class="main-content">

        <section id="view-dashboard" class="pro-view active-view">
            <h1>Dashboard</h1>

            <div class="pro-kpi-card">KPI 1</div>
            <div class="pro-kpi-card">KPI 2</div>
            <div class="pro-kpi-card">KPI 3</div>

            <div id="heatmapContainer"></div>
        </section>

        <section id="view-documents" class="pro-view">
            <h1>Documentos</h1>

            <div class="documents-container">

                <div class="documents-list" id="documentsList"></div>

                <div class="documents-preview">
                    <h2>Vista previa</h2>
                    <div id="documentsPreviewContent">Selecciona un documento…</div>
                </div>

            </div>
        </section>

        <section id="view-integrations" class="pro-view">
            <h1>Integraciones</h1>

            <div class="integrations-grid" id="integrationsGrid"></div>
        </section>

        <section id="view-graph-advanced" class="pro-view">
            <h1>Grafo Avanzado</h1>

            <div id="graphAdvancedContainer" style="height: 500px;"></div>
        </section>

    </main>

    <!-- SCRIPTS -->
    <script src="pro-core.js"></script>
    <script src="pro-dashboard.js"></script>
    <script src="pro-documents.js"></script>
    <script src="pro-integrations.js"></script>
    <script src="pro-graph-advanced.js"></script>
    <script src="pro-heatmap.js"></script>

</body>
</html>
