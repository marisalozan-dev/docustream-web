<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuStream PRO — Demo Interactiva</title>

    <link rel="stylesheet" href="assets/css/style-demo.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Librerías -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
</head>

<body>

    <!-- ========================= SIDEBAR ========================= -->
    <aside class="sidebar">
        <h2>DocuStream PRO</h2>

        <nav>
            <button onclick="showView('dashboard')">Dashboard</button>
            <button onclick="showView('documents')">Documentos</button>
            <button onclick="showView('integrations')">Integraciones</button>
            <button onclick="showView('graph-advanced')">Grafo Avanzado</button>
            <a href="index.html" class="back-link">← Volver a la landing</a>
        </nav>
    </aside>

    <!-- ========================= CONTENIDO ========================= -->
    <main class="main-content">

        <!-- DASHBOARD -->
        <section id="view-dashboard" class="pro-view active-view">
            <h1>Dashboard</h1>

            <div class="pro-kpi-grid">
                <div class="pro-kpi-card">
                    <h3>Documentos procesados</h3>
                    <p id="kpiDocs" class="kpi-value">0</p>
                </div>
                <div class="pro-kpi-card">
                    <h3>Latencia media</h3>
                    <p id="kpiLatency" class="kpi-value">0</p>
                </div>
                <div class="pro-kpi-card">
                    <h3>Calidad del dato</h3>
                    <p id="kpiQuality" class="kpi-value">0</p>
                </div>
                <div class="pro-kpi-card">
                    <h3>Anomalías detectadas</h3>
                    <p id="kpiAnomalies" class="kpi-value">0</p>
                </div>
            </div>

            <div class="pro-dashboard-charts">
                <div id="activityChart" class="pro-panel"></div>
                <div id="qualityDonut" class="pro-panel"></div>
            </div>

            <div id="dashboardInsight" class="pro-panel"></div>

            <div id="heatmapContainer"></div>
        </section>

        <!-- DOCUMENTOS -->
        <section id="view-documents" class="pro-view">
            <h1>Documentos</h1>

            <div class="documents-container">
                <div class="documents-list" id="documentsList"></div>

                <div class="documents-preview">
                    <h2>Vista previa</h2>
                    <div id="documentsPreviewContent">Selecciona un documento…</div>
                </div>
            </div>
        </section>

        <!-- INTEGRACIONES -->
        <section id="view-integrations" class="pro-view">
            <h1>Integraciones</h1>
            <div class="integrations-grid" id="integrationsGrid"></div>
        </section>

        <!-- GRAFO AVANZADO -->
        <section id="view-graph-advanced" class="pro-view">
            <h1>Grafo Avanzado</h1>
            <div id="graphAdvancedContainer" class="graph-container"></div>
        </section>

    </main>

    <!-- ========================= SCRIPTS ========================= -->
    <script src="assets/js/pro-core.js"></script>
    <script src="assets/js/pro-dashboard.js"></script>
    <script src="assets/js/pro-documents.js"></script>
    <script src="assets/js/pro-integrations.js"></script>
    <script src="assets/js/pro-graph-advanced.js"></script>
    <script src="assets/js/pro-heatmap.js"></script>

</body>
</html>
