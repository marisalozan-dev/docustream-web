<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuStream — Inteligencia de Datos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --leaf-green: #7ED7A1;
            --mint-light: #CFFFE5;
            --warm-white: #FDFDFB;
            --cloud-grey: #E9EEF2;
            --text-soft: #4A4A4A;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--warm-white); 
            color: var(--text-soft); 
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            background: rgba(253, 253, 251, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--cloud-grey);
        }

        .logo { font-weight: 800; font-size: 1.5rem; color: var(--text-soft); text-decoration: none; letter-spacing: -1px; }
        .logo span { color: var(--leaf-green); }

        .hero { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            padding: 150px 8% 100px 8%; 
            min-height: 100vh; 
        }

        .hero-content { flex: 1; max-width: 600px; }
        .hero-content h1 { 
            font-size: 3.8rem; 
            line-height: 1.1; 
            margin-bottom: 25px; 
            letter-spacing: -2px; 
            color: var(--text-soft); 
        }
        .hero-content p { 
            font-size: 1.25rem; 
            color: #666; 
            margin-bottom: 40px; 
            max-width: 90%;
        }

        .btn-primary {
            background-color: var(--leaf-green);
            color: white;
            padding: 18px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(126, 215, 161, 0.3);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(126, 215, 161, 0.4); }

        .hero-visual { flex: 1; display: flex; justify-content: flex-end; }
        .hero-visual svg { width: 100%; height: auto; max-width: 750px; filter: drop-shadow(0 20px 40px rgba(0,0,0,0.12)); }

        @keyframes dash { to { stroke-dashoffset: -80; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .flow-line { stroke-dasharray: 18 12; animation: dash 2s linear infinite; }
        .floating { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">Docu<span>Stream</span></a>
        <nav>
            <a href="demo.html" style="text-decoration:none; color:var(--leaf-green); font-weight:700;">Demo Interactiva →</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Documentación que cobra vida</h1>
            <p>Transformamos datos complejos y manuales estáticos en flujos de conocimiento dinámicos mediante grafos semánticos e IA.</p>
            <a href="demo.html" class="btn-primary">Explorar Prototipo</a>
        </div>

        <div class="hero-visual">
            <svg viewBox="0 0 1600 1200" xmlns="http://www.w3.org/2000/svg">
                <path class="flow-line" d="M 440 360 Q 620 440 740 570" fill="none" stroke="#7ED7A1" stroke-width="5" />
                <path class="flow-line" d="M 1160 360 Q 990 440 870 570" fill="none" stroke="#7ED7A1" stroke-width="5" />
                <path class="flow-line" d="M 780 670 Q 660 780 440 840" fill="none" stroke="#7ED7A1" stroke-width="5" />
                <path class="flow-line" d="M 830 670 Q 970 780 1160 840" fill="none" stroke="#7ED7A1" stroke-width="5" />

                <g class="floating">
                    <circle cx="800" cy="620" r="120" fill="#4A4A4A"/>
                    <circle cx="800" cy="620" r="100" fill="none" stroke="#7ED7A1" stroke-width="3" stroke-dasharray="10 10"/>
                    <text x="800" y="630" font-family="sans-serif" font-size="22" font-weight="800" fill="#7ED7A1" text-anchor="middle">MOTOR SEMÁNTICO</text>
                </g>

                <g class="floating" style="animation-delay: -1s">
                    <rect x="280" y="170" width="220" height="280" rx="15" fill="#E9EEF2" stroke="#4A4A4A" stroke-width="3"/>
                    <line x1="320" y1="230" x2="460" y2="230" stroke="#4A4A4A" stroke-width="6" opacity="0.2"/>
                    <line x1="320" y1="260" x2="400" y2="260" stroke="#4A4A4A" stroke-width="6" opacity="0.2"/>
                    <text x="390" y="500" font-family="sans-serif" font-size="28" font-weight="700" fill="#4A4A4A" text-anchor="middle">Fuentes</text>
                </g>

                <g class="floating" style="animation-delay: -2s">
                    <rect x="1100" y="170" width="220" height="280" rx="15" fill="#E9EEF2" stroke="#4A4A4A" stroke-width="3"/>
                    <line x1="1140" y1="230" x2="1280" y2="230" stroke="#4A4A4A" stroke-width="6" opacity="0.2"/>
                    <text x="1210" y="500" font-family="sans-serif" font-size="28" font-weight="700" fill="#4A4A4A" text-anchor="middle">Validación</text>
                </g>

                <g class="floating" style="animation-delay: -0.5s">
                    <rect x="280" y="740" width="220" height="280" rx="15" fill="#E9EEF2" stroke="#4A4A4A" stroke-width="3"/>
                    <text x="390" y="1070" font-family="sans-serif" font-size="28" font-weight="700" fill="#4A4A4A" text-anchor="middle">Procesos</text>
                </g>

                <g class="floating" style="animation-delay: -1.5s">
                    <rect x="1100" y="740" width="220" height="280" rx="15" fill="#E9EEF2" stroke="#4A4A4A" stroke-width="3"/>
                    <text x="1210" y="1070" font-family="sans-serif" font-size="28" font-weight="700" fill="#4A4A4A" text-anchor="middle">Análisis</text>
                </g>
            </svg>
        </div>
    </section>

</body>
</html>
