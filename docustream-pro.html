<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocuStream PRO — Dashboard</title>
    <link rel="stylesheet" href="style-pro.css">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <img id="logo" src="assets/images/logo-light.svg" class="logo">

        <nav>
            <button class="menu-item active" data-panel="dashboard">Dashboard</button>
            <button class="menu-item" data-panel="graph">Grafo Semántico</button>
            <button class="menu-item" data-panel="heatmap">Heatmap</button>
            <button class="menu-item" data-panel="docs">Documentos Críticos</button>
            <button class="menu-item" data-panel="alerts">Alertas</button>
            <button class="menu-item" data-panel="config">Configuración</button>
        </nav>
    </aside>

    <!-- CONTENIDO -->
    <main class="content">

        <!-- DASHBOARD -->
        <section id="dashboard" class="panel active">
            <h2>Documentos procesados</h2>
            <canvas id="chartDocs"></canvas>
        </section>

        <!-- GRAFO -->
        <section id="graph" class="panel">
            <h2>Grafo Semántico</h2>
            <canvas id="graphCanvas"></canvas>
        </section>

        <!-- HEATMAP -->
        <section id="heatmap" class="panel">
            <h2>Heatmap de Frecuencias</h2>
            <canvas id="heatmapCanvas"></canvas>
        </section>

        <!-- CONFIG -->
        <section id="config" class="panel">
            <h2>Configuración</h2>
            <button id="configThemeToggle" class="btn">Cambiar modo</button>
        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="assets/js/pro.js"></script>

</body>
</html>
