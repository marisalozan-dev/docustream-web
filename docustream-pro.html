 <!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>docustream-pro – DocuStream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="style-pro.css">

  <!-- Librerías necesarias -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>

  <!-- BOTÓN HAMBURGUESA (DEBE IR AQUÍ) -->
 <button id="menuToggle" class="menu-toggle">
  <span></span>
</button>


  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">DocuStream PRO</div>
    <nav>
      <a href="#dashboard">📊 Dashboard</a>
      <a href="#graph">🕸 Grafo</a>
      <a href="#heatmap">🔥 Heatmap</a>
      <a href="demo.html">Demo simple</a>
      <a href="DocuStream_Dossier.html" target="_blank">Dossier</a>
      <a href="https://github.com/marisalozan-dev" target="_blank">GitHub</a>
    </nav>
  </aside>

  <!-- CONTENIDO PRINCIPAL -->
  <main class="content">

    <!-- BOTÓN MODO OSCURO -->
    <button id="darkToggle" class="dark-toggle">Modo oscuro</button>

    <!-- DASHBOARD -->
    <section id="dashboard" class="fade-in">
      <h1>Dashboard PRO</h1>
      <div id="cards" class="cards"></div>
     <div class="donut-container">
  <canvas id="donutChart"></canvas>
  <div id="donutLabel" class="donut-label">85%</div>
</div>

    </section>

    <!-- GRAFO -->
    <section id="graph" class="fade-in">
      <h1>Grafo semántico avanzado</h1>
      <svg id="graphCanvas" width="900" height="500"></svg>
    </section>

    <!-- HEATMAP -->
    <section id="heatmap" class="fade-in">
      <h1>Heatmap de comportamiento</h1>
      <div id="heatmapContainer" class="heatmap"></div>
    </section>

  </main>

  <!-- SCRIPTS -->
  <script src="js/darkmode-pro.js"></script>
  <script src="js/sidebar-pro.js"></script>
  <script src="js/dashboard-pro.js"></script>
  <script src="js/graph-pro.js"></script>
  <script src="js/heatmap-pro.js"></script>

<div id="overlay" class="overlay"></div>
<div id="graphTooltip" class="tooltip-graph"></div>


</body>
</html>
